name: Bug Report
description: Report a bug in cache-mesh
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: cache-mesh version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 20.11.0
    validations:
      required: true
  - type: dropdown
    id: discovery
    attributes:
      label: Discovery mode
      options:
        - dns (headless Service)
        - static
        - custom
    validations:
      required: true
  - type: input
    id: replicas
    attributes:
      label: Number of pods/replicas
      placeholder: e.g. 3
