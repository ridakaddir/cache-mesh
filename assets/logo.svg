<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#0F172A"/>

  <!-- Mesh lines connecting the 3 nodes -->
  <line x1="128" y1="60" x2="68" y2="175" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="128" y1="60" x2="188" y2="175" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="68" y1="175" x2="188" y2="175" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Sync arrows on the lines -->
  <path d="M98 117 L93 107 L103 110" stroke="#38BDF8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M158 117 L163 107 L153 110" stroke="#38BDF8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M128 175 L123 165 L133 165" stroke="#38BDF8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Node circles (pods) -->
  <circle cx="128" cy="60" r="22" fill="#1E293B" stroke="#38BDF8" stroke-width="2.5"/>
  <circle cx="68" cy="175" r="22" fill="#1E293B" stroke="#38BDF8" stroke-width="2.5"/>
  <circle cx="188" cy="175" r="22" fill="#1E293B" stroke="#38BDF8" stroke-width="2.5"/>

  <!-- Cache icon (stacked lines) inside each node -->
  <!-- Top node -->
  <rect x="118" y="52" width="20" height="4" rx="2" fill="#38BDF8"/>
  <rect x="118" y="58" width="20" height="4" rx="2" fill="#38BDF8" opacity="0.7"/>
  <rect x="118" y="64" width="20" height="4" rx="2" fill="#38BDF8" opacity="0.4"/>

  <!-- Bottom-left node -->
  <rect x="58" y="167" width="20" height="4" rx="2" fill="#38BDF8"/>
  <rect x="58" y="173" width="20" height="4" rx="2" fill="#38BDF8" opacity="0.7"/>
  <rect x="58" y="179" width="20" height="4" rx="2" fill="#38BDF8" opacity="0.4"/>

  <!-- Bottom-right node -->
  <rect x="178" y="167" width="20" height="4" rx="2" fill="#38BDF8"/>
  <rect x="178" y="173" width="20" height="4" rx="2" fill="#38BDF8" opacity="0.7"/>
  <rect x="178" y="179" width="20" height="4" rx="2" fill="#38BDF8" opacity="0.4"/>
</svg>
